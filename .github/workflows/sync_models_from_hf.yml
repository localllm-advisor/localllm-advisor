name: Sync Models from Hugging Face

on:
  schedule:
    # Every 4 hours at :00 — discover new LLMs and refresh download counts
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print changes but do not commit)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

# Only one sync at a time; never cancel in progress (avoid corrupt JSON)
concurrency:
  group: sync-models-from-hf
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 h — the sync hits 1000+ HF repos, each needing an API call

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow is fine — we only need working tree

      # ── Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Sync ────────────────────────────────────────────────────────────
      - name: Sync models dataset from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/sync_models_from_hf.py

      # ── Commit ──────────────────────────────────────────────────────────
      - name: Commit and push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Frontend stat counts (AI Models, GPU Types, etc.) are now read
          # dynamically from the JSON files at build time via datasetStats.ts.
          # Only models.json needs to be committed — no TSX patching required.
          CHANGED=$(git diff --name-only -- public/data/models.json)

          if [ -z "$CHANGED" ]; then
            echo "No relevant files changed — skipping commit."
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only models.json — TSX files no longer need updating
          git add public/data/models.json

          # Build a meaningful commit message.
          # NOTE: no [skip ci] — we WANT Vercel to redeploy so the frontend
          # picks up the new models.json (frontend counts are read from the
          # file at build time via datasetStats.ts).
          MODEL_COUNT=$(python3 -c "import json; d=json.load(open('public/data/models.json')); print(len(d))")
          git commit -m "data(models): sync from Hugging Face — ${MODEL_COUNT} models"

          # The sync takes several hours; other workflows (GPU prices, etc.) may
          # have pushed in the meantime. Rebase our commit on top of those so the
          # push never fails with "fetch first".
          git pull --rebase origin main
          git push

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          MODEL_COUNT=$(python3 -c "import json; d=json.load(open('public/data/models.json')); print(len(d))" 2>/dev/null || echo "unknown")
          echo "Sync completed at $(date -u)"
          echo "Total models in dataset: ${MODEL_COUNT}"
