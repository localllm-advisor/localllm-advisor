name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Also trigger when any data-sync workflow completes on main.
  # This is needed because GitHub Actions does NOT fire push-triggered
  # workflows when the push comes from a workflow using GITHUB_TOKEN
  # (security restriction). workflow_run bypasses this — it fires on the
  # completion of the named workflow, regardless of who pushed.
  workflow_run:
    workflows:
      - "Sync GPU/CPU Specs"
      - "Sync Models from HF"
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # For workflow_run events only rebuild when the source workflow succeeded.
    # For regular push events always rebuild.
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `npm run build` automatically invokes the `prebuild` script defined in
      # package.json, which runs generate-og-images.js + generate-api-json.js
      # before next build. Those output folders are .gitignored.
      - run: npm run build
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_BUTTONDOWN_ID: ${{ secrets.BUTTONDOWN_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
