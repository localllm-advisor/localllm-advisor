name: Scrape GPU Prices

on:
  schedule:
    # Run every hour at :00 (GitHub Actions may delay up to a few minutes)
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

concurrency:
  group: scrape-gpu-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Abort if scrape takes longer than 45 min (safety net)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run GPU price scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/scrape_gpu_prices.py

      - name: Summary
        if: always()
        run: |
          GPU_DATASET=$(python3 -c "import json; d=json.load(open('public/data/gpus.json')); print(len(d))" 2>/dev/null || echo "unknown")
          GPU_TRACKED=$(python3 -c "
          import sys; sys.path.insert(0, 'scripts')
          # Count GPU_TARGETS dict entries in scrape_gpu_prices.py
          import re, pathlib
          src = pathlib.Path('scripts/scrape_gpu_prices.py').read_text()
          entries = re.findall(r'\"NVIDIA|\"AMD|\"Intel', src)
          print(len(entries))
          " 2>/dev/null || echo "unknown")
          echo "========================================"
          echo "GPU price scraping completed at $(date -u)"
          echo "Total GPUs in dataset (gpus.json): ${GPU_DATASET}"
          echo "GPUs tracked for price scraping:   ${GPU_TRACKED}"
          echo "========================================"
